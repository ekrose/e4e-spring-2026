<svg viewBox="0 0 700 530" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="530" fill="#fafafa"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#333">Effect of Financial Incentives on Student Achievement</text>

  <!-- X-axis: range -0.20 to 0.35 → 0.55 range -->
  <!-- Plot area x: 130 to 600, width=470 -->
  <!-- scale = 470/0.55 = 854.5 px per unit -->
  <!-- x(val) = 130 + (val + 0.20) * 854.5 -->
  <!-- x(0) = 130 + 0.20*854.5 = 301 -->

  <line x1="130" y1="480" x2="600" y2="480" stroke="#333" stroke-width="1.5"/>

  <!-- Zero line -->
  <line x1="301" y1="62" x2="301" y2="480" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- X grid lines and labels -->
  <line x1="130" y1="62" x2="130" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="130" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">−0.20</text>

  <line x1="173" y1="62" x2="173" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="173" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">−0.15</text>

  <line x1="216" y1="62" x2="216" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="216" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">−0.10</text>

  <line x1="258" y1="62" x2="258" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="258" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">−0.05</text>

  <text x="301" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.00</text>

  <line x1="344" y1="62" x2="344" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="344" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.05</text>

  <line x1="387" y1="62" x2="387" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="387" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.10</text>

  <line x1="429" y1="62" x2="429" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="429" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.15</text>

  <line x1="472" y1="62" x2="472" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="472" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.20</text>

  <line x1="515" y1="62" x2="515" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="515" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.25</text>

  <line x1="557" y1="62" x2="557" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="557" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.30</text>

  <line x1="600" y1="62" x2="600" y2="480" stroke="#eee" stroke-width="1"/>
  <text x="600" y="498" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#666">0.35</text>

  <!-- X-axis title -->
  <text x="365" y="518" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#333">Effect size</text>

  <!-- ============ Dallas 2nd Grade (Maroon) ============ -->
  <text x="125" y="75" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#800000">Dallas (2nd)</text>
  <line x1="130" y1="82" x2="600" y2="82" stroke="#ddd" stroke-width="1"/>

  <!-- Rdg. Comp.: 0.180 (0.075) → x=455, 2SE=128, lo=455-128=327, hi=455+128=583 -->
  <text x="125" y="105" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Reading Comp.</text>
  <line x1="327" y1="101" x2="583" y2="101" stroke="#800000" stroke-width="1.5"/>
  <line x1="327" y1="96" x2="327" y2="106" stroke="#800000" stroke-width="1.5"/>
  <line x1="583" y1="96" x2="583" y2="106" stroke="#800000" stroke-width="1.5"/>
  <circle cx="455" cy="101" r="5" fill="#800000"/>

  <!-- Rdg. Vocab.: 0.051 (0.068) → x=345, 2SE=116, lo=345-116=229, hi=345+116=461 -->
  <text x="125" y="140" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Reading Vocab.</text>
  <line x1="229" y1="136" x2="461" y2="136" stroke="#800000" stroke-width="1.5"/>
  <line x1="229" y1="131" x2="229" y2="141" stroke="#800000" stroke-width="1.5"/>
  <line x1="461" y1="131" x2="461" y2="141" stroke="#800000" stroke-width="1.5"/>
  <circle cx="345" cy="136" r="5" fill="#800000"/>

  <!-- Language Total: 0.136 (0.080) → x=417, 2SE=137, lo=417-137=280, hi=417+137=554 -->
  <text x="125" y="175" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Language Total</text>
  <line x1="280" y1="171" x2="554" y2="171" stroke="#800000" stroke-width="1.5"/>
  <line x1="280" y1="166" x2="280" y2="176" stroke="#800000" stroke-width="1.5"/>
  <line x1="554" y1="166" x2="554" y2="176" stroke="#800000" stroke-width="1.5"/>
  <circle cx="417" cy="171" r="5" fill="#800000"/>

  <!-- ============ NYC 4th Grade (Orange) ============ -->
  <text x="125" y="215" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#ff8243">NYC (4th)</text>
  <line x1="130" y1="222" x2="600" y2="222" stroke="#ddd" stroke-width="1"/>

  <!-- Reading: -0.021 (0.033) → x=283, 2SE=56, lo=283-56=227, hi=283+56=339 -->
  <text x="125" y="245" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Reading</text>
  <line x1="227" y1="241" x2="339" y2="241" stroke="#ff8243" stroke-width="1.5"/>
  <line x1="227" y1="236" x2="227" y2="246" stroke="#ff8243" stroke-width="1.5"/>
  <line x1="339" y1="236" x2="339" y2="246" stroke="#ff8243" stroke-width="1.5"/>
  <circle cx="283" cy="241" r="5" fill="#ff8243"/>

  <!-- Math: 0.067 (0.046) → x=358, 2SE=79, lo=358-79=279, hi=358+79=437 -->
  <text x="125" y="280" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Math</text>
  <line x1="279" y1="276" x2="437" y2="276" stroke="#ff8243" stroke-width="1.5"/>
  <line x1="279" y1="271" x2="279" y2="281" stroke="#ff8243" stroke-width="1.5"/>
  <line x1="437" y1="271" x2="437" y2="281" stroke="#ff8243" stroke-width="1.5"/>
  <circle cx="358" cy="276" r="5" fill="#ff8243"/>

  <!-- ============ NYC 7th Grade (Orange, lighter) ============ -->
  <text x="125" y="320" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e06a2a">NYC (7th)</text>
  <line x1="130" y1="327" x2="600" y2="327" stroke="#ddd" stroke-width="1"/>

  <!-- Reading: 0.018 (0.018) → x=316, 2SE=31, lo=316-31=285, hi=316+31=347 -->
  <text x="125" y="350" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Reading</text>
  <line x1="285" y1="346" x2="347" y2="346" stroke="#e06a2a" stroke-width="1.5"/>
  <line x1="285" y1="341" x2="285" y2="351" stroke="#e06a2a" stroke-width="1.5"/>
  <line x1="347" y1="341" x2="347" y2="351" stroke="#e06a2a" stroke-width="1.5"/>
  <circle cx="316" cy="346" r="5" fill="#e06a2a"/>

  <!-- Math: -0.018 (0.035) → x=286, 2SE=60, lo=286-60=226, hi=286+60=346 -->
  <text x="125" y="385" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Math</text>
  <line x1="226" y1="381" x2="346" y2="381" stroke="#e06a2a" stroke-width="1.5"/>
  <line x1="226" y1="376" x2="226" y2="386" stroke="#e06a2a" stroke-width="1.5"/>
  <line x1="346" y1="376" x2="346" y2="386" stroke="#e06a2a" stroke-width="1.5"/>
  <circle cx="286" cy="381" r="5" fill="#e06a2a"/>

  <!-- ============ Chicago 9th Grade (Dark Maroon) ============ -->
  <text x="125" y="425" text-anchor="end" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4a0000">Chicago (9th)</text>
  <line x1="130" y1="432" x2="600" y2="432" stroke="#ddd" stroke-width="1"/>

  <!-- Reading: -0.006 (0.027) → x=296, 2SE=46, lo=296-46=250, hi=296+46=342 -->
  <text x="125" y="455" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Reading</text>
  <line x1="250" y1="451" x2="342" y2="451" stroke="#4a0000" stroke-width="1.5"/>
  <line x1="250" y1="446" x2="250" y2="456" stroke="#4a0000" stroke-width="1.5"/>
  <line x1="342" y1="446" x2="342" y2="456" stroke="#4a0000" stroke-width="1.5"/>
  <circle cx="296" cy="451" r="5" fill="#4a0000"/>

  <!-- Math: -0.010 (0.023) → x=292, 2SE=39, lo=292-39=253, hi=292+39=331 -->
  <text x="125" y="473" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#333">Math</text>
  <line x1="253" y1="469" x2="331" y2="469" stroke="#4a0000" stroke-width="1.5"/>
  <line x1="253" y1="464" x2="253" y2="474" stroke="#4a0000" stroke-width="1.5"/>
  <line x1="331" y1="464" x2="331" y2="474" stroke="#4a0000" stroke-width="1.5"/>
  <circle cx="292" cy="469" r="5" fill="#4a0000"/>

  <!-- Legend -->
  <rect x="470" y="329.5" width="100" height="100" fill="white" stroke="#ddd" rx="4"/>
  <circle cx="490" cy="347.5" r="4" fill="#800000"/>
  <text x="500" y="351.5" font-family="Inter, sans-serif" font-size="10" fill="#333">Dallas (2nd)</text>
  <circle cx="490" cy="369.5" r="4" fill="#ff8243"/>
  <text x="500" y="373.5" font-family="Inter, sans-serif" font-size="10" fill="#333">NYC (4th)</text>
  <circle cx="490" cy="395.5" r="4" fill="#e06a2a"/>
  <text x="500" y="399.5" font-family="Inter, sans-serif" font-size="10" fill="#333">NYC (7th)</text>
  <circle cx="490" cy="417.5" r="4" fill="#4a0000"/>
  <text x="500" y="421.5" font-family="Inter, sans-serif" font-size="10" fill="#333">Chicago (9th)</text>

  <!-- Source -->
  <text x="600" y="528" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#999">Source: Fryer (2010), Tables 2 &amp; 3</text>
</svg>