<svg viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 16px sans-serif; fill: #333; }
    .label { font: 13px sans-serif; fill: #333; }
    .axis-label { font: 11px sans-serif; fill: #666; }
  </style>

  <!-- Background -->
  <rect width="600" height="350" fill="#fafafa"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" class="title">Police Killings Before and After George Floyd</text>

  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="280" x2="550" y2="280" stroke="#333" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="35" y="165" text-anchor="middle" class="label" transform="rotate(-90, 35, 165)">Monthly Killings</text>
  <text x="315" y="310" text-anchor="middle" class="label">Month</text>

  <!-- Event line -->
  <line x1="300" y1="50" x2="300" y2="280" stroke="#800000" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="300" y="320" text-anchor="middle" class="axis-label">May 2020</text>

  <!-- Pre-event data points (fluctuating around higher level) -->
  <polyline points="100,120 130,140 160,110 190,130 220,115 250,125 280,135"
            fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="100" cy="120" r="4" fill="#333"/>
  <circle cx="130" cy="140" r="4" fill="#333"/>
  <circle cx="160" cy="110" r="4" fill="#333"/>
  <circle cx="190" cy="130" r="4" fill="#333"/>
  <circle cx="220" cy="115" r="4" fill="#333"/>
  <circle cx="250" cy="125" r="4" fill="#333"/>
  <circle cx="280" cy="135" r="4" fill="#333"/>

  <!-- Post-event data points (lower level) -->
  <polyline points="320,180 350,200 380,185 410,210 440,195 470,205 500,190 530,200"
            fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="320" cy="180" r="4" fill="#333"/>
  <circle cx="350" cy="200" r="4" fill="#333"/>
  <circle cx="380" cy="185" r="4" fill="#333"/>
  <circle cx="410" cy="210" r="4" fill="#333"/>
  <circle cx="440" cy="195" r="4" fill="#333"/>
  <circle cx="470" cy="205" r="4" fill="#333"/>
  <circle cx="500" cy="190" r="4" fill="#333"/>
  <circle cx="530" cy="200" r="4" fill="#333"/>

  <!-- Average lines -->
  <line x1="100" y1="125" x2="280" y2="125" stroke="#666" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="320" y1="195" x2="530" y2="195" stroke="#666" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Drop annotation -->
  <line x1="290" y1="125" x2="290" y2="195" stroke="#800000" stroke-width="2"/>
  <text x="260" y="160" class="axis-label" fill="#800000">Drop</text>
</svg>
