  <text x="130" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#666">1920</text>
  <text x="229" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#666">1940</text>
  <text x="328" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#666">1960</text>
  <text x="427" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#666">1980</text>
  <text x="526" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#666">2000</text>
  <text x="625" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#666">2020</text>

