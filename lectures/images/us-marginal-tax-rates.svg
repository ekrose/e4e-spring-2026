  <line x1="80" y1="194" x2="650" y2="194" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="70" y="198" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#666">60%</text>
