  <text x="70" y="384" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#666">0%</text>
  <line x1="80" y1="318" x2="650" y2="318" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="70" y="322" text-anchor="end" font-family="Inter, sans-serif" font-size="12" fill="#666">20%</text>
  <line x1="80" y1="256" x2="650" y2="256" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
