<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <linearGradient id="highGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#800000;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#800000;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="lowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8243;stop-opacity:0.3"/>
