  <!-- Axes -->
  <line x1="80" y1="380" x2="650" y2="380" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="380" x2="80" y2="70" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis labels: 0-100%, scale = 310px / 100% = 3.1px per % -->
