<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="bold" fill="#333">How Insurance Pooling Works</text>

  <!-- Individual side -->
  <rect x="30" y="70" width="280" height="280" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <text x="170" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#800000">Without Insurance</text>

  <!-- Individual icons -->
  <g transform="translate(70, 130)">
    <circle cx="20" cy="15" r="12" fill="#666"/>
    <ellipse cx="20" cy="45" rx="15" ry="20" fill="#666"/>
    <text x="20" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#333">You</text>
  </g>

  <!-- Outcomes for individual -->
  <text x="170" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#333">50% chance</text>

  <!-- Good outcome -->
  <g transform="translate(130, 170)">
    <rect x="0" y="0" width="80" height="50" rx="5" fill="#4CAF50" opacity="0.2"/>
    <text x="40" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#2E7D32">Win $20</text>
    <text x="40" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#2E7D32">+$20</text>
  </g>

  <!-- Bad outcome -->
  <g transform="translate(130, 235)">
    <rect x="0" y="0" width="80" height="50" rx="5" fill="#f44336" opacity="0.2"/>
    <text x="40" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#c62828">Win $0</text>
    <text x="40" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#c62828">$0</text>
  </g>

  <text x="170" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#333">Expected: $10</text>
  <text x="170" y="328" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#800000" font-weight="bold">Certainty equivalent: ~$9</text>

  <!-- Arrow -->
  <path d="M 330 210 L 370 210" stroke="#800000" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#800000"/>
    </marker>
  </defs>

  <!-- Insurance side -->
  <rect x="390" y="70" width="280" height="280" rx="10" fill="#fff" stroke="#ddd" stroke-width="2"/>
  <text x="530" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#ff8243">With Insurance</text>

  <!-- Insurer -->
  <g transform="translate(420, 120)">
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#ff8243" opacity="0.3"/>
    <text x="30" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#333">Insurer</text>
  </g>

  <!-- Pool of people -->
  <g transform="translate(510, 115)">
    <circle cx="15" cy="12" r="8" fill="#666"/>
    <ellipse cx="15" cy="30" rx="10" ry="13" fill="#666"/>
  </g>
  <g transform="translate(540, 115)">
    <circle cx="15" cy="12" r="8" fill="#666"/>
    <ellipse cx="15" cy="30" rx="10" ry="13" fill="#666"/>
  </g>
  <g transform="translate(570, 115)">
    <circle cx="15" cy="12" r="8" fill="#666"/>
    <ellipse cx="15" cy="30" rx="10" ry="13" fill="#666"/>
  </g>
  <g transform="translate(600, 115)">
    <circle cx="15" cy="12" r="8" fill="#666"/>
    <ellipse cx="15" cy="30" rx="10" ry="13" fill="#666"/>
  </g>
  <text x="570" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#333">Many people</text>

  <!-- Transaction -->
  <g transform="translate(420, 185)">
    <rect x="0" y="0" width="220" height="45" rx="5" fill="#e3f2fd"/>
    <text x="110" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#333">You pay $9.50 premium</text>
    <text x="110" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#333">Insurer covers your outcome</text>
  </g>

  <!-- Guaranteed outcome -->
  <g transform="translate(420, 245)">
    <rect x="0" y="0" width="220" height="55" rx="5" fill="#4CAF50" opacity="0.2"/>
    <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Your outcome: GUARANTEED</text>
    <text x="110" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#2E7D32">+$9.50</text>
  </g>

  <text x="530" y="325" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#333">Insurer profit: $0.50/person</text>
  <text x="530" y="343" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#ff8243" font-weight="bold">You get certainty you value!</text>

  <!-- Bottom note -->
  <text x="350" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#800000" font-style="italic">Both parties are better off than without insurance</text>
</svg>
