<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <style>
    .axis { stroke: #333; stroke-width: 1.5; }
    .label { font-family: Inter, sans-serif; font-size: 12px; fill: #333; }
    .title { font-family: Inter, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Inter, sans-serif; font-size: 13px; fill: #666; }
    .annotation { font-family: Inter, sans-serif; font-size: 11px; fill: #666; }
  </style>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" class="title">More Data = Less Uncertainty</text>
  <text x="350" y="45" text-anchor="middle" class="subtitle">Distribution of estimated probability of rolling a 1</text>

  <!-- Y-axis -->
  <line x1="80" y1="70" x2="80" y2="310" class="axis"/>
  <text x="30" y="190" text-anchor="middle" transform="rotate(-90,30,190)" class="label">Probability Density</text>

  <!-- X-axis -->
  <line x1="80" y1="310" x2="620" y2="310" class="axis"/>
  <text x="350" y="350" text-anchor="middle" class="label">Estimated probability of rolling a 1</text>

  <!-- X-axis labels -->
  <text x="80" y="328" text-anchor="middle" class="annotation">0</text>
  <text x="188" y="328" text-anchor="middle" class="annotation">0.1</text>
  <text x="296" y="328" text-anchor="middle" class="annotation">0.17</text>
  <text x="404" y="328" text-anchor="middle" class="annotation">0.3</text>
  <text x="512" y="328" text-anchor="middle" class="annotation">0.4</text>
  <text x="620" y="328" text-anchor="middle" class="annotation">0.5</text>

  <!-- True value line at 1/6 ≈ 0.167 -->
  <line x1="296" y1="70" x2="296" y2="310" stroke="#333" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="296" y="62" text-anchor="middle" class="annotation">True value: 1/6</text>

  <!-- N=10 distribution (wide, flat) - smooth bell -->
  <path d="M 80,310
           C 100,308 130,300 170,280
           C 210,255 250,210 296,160
           C 342,210 382,255 422,280
           C 462,300 492,308 512,310
           L 512,310 L 80,310 Z"
        fill="#ff8243" fill-opacity="0.5" stroke="#ff8243" stroke-width="2"/>

  <!-- N=100 distribution (medium) - narrower bell -->
  <path d="M 170,310
           C 190,308 215,295 240,265
           C 265,225 282,170 296,120
           C 310,170 327,225 352,265
           C 377,295 402,308 422,310
           L 422,310 L 170,310 Z"
        fill="#800000" fill-opacity="0.5" stroke="#800000" stroke-width="2"/>

  <!-- N=1000 distribution (narrow, tall) - tight bell -->
  <path d="M 246,310
           C 256,305 270,280 282,230
           C 290,180 294,130 296,90
           C 298,130 302,180 310,230
           C 322,280 336,305 346,310
           L 346,310 L 246,310 Z"
        fill="#4a0000" fill-opacity="0.7" stroke="#4a0000" stroke-width="2"/>

  <!-- Legend -->
  <rect x="480" y="85" width="18" height="12" fill="#ff8243" fill-opacity="0.5" stroke="#ff8243"/>
  <text x="505" y="95" class="annotation">N = 10 rolls</text>

  <rect x="480" y="105" width="18" height="12" fill="#800000" fill-opacity="0.5" stroke="#800000"/>
  <text x="505" y="115" class="annotation">N = 100 rolls</text>

  <rect x="480" y="125" width="18" height="12" fill="#4a0000" fill-opacity="0.7" stroke="#4a0000"/>
  <text x="505" y="135" class="annotation">N = 1,000 rolls</text>

  <!-- Insight box -->
  <rect x="470" y="160" width="150" height="55" fill="#f5f5f5" stroke="#ccc" rx="5"/>
  <text x="545" y="180" text-anchor="middle" class="annotation">As N grows,</text>
  <text x="545" y="195" text-anchor="middle" class="annotation">estimates cluster</text>
  <text x="545" y="210" text-anchor="middle" class="annotation">around the truth</text>
</svg>