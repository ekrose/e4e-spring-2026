  <line x1="80" y1="229" x2="650" y2="229" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="151" x2="650" y2="151" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

